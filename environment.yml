name: continual-learning-project
channels:
  - conda-forge
dependencies:
  - python=3.10
  - numpy=2.2.6
  - scipy=1.15.2
  - scikit-learn=1.7.2
  - pandas=2.3.3
  - matplotlib=3.10.9
  - tqdm=4.68.3
  - pyyaml=6.0.3
  - psutil=7.2.2
  - pip
  - pip:
      # Install torch/torchvision separately with the CUDA index shown in README.md:
      # python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cu128
      - timm==0.6.7
      - ftfy==6.3.1
      - regex==2024.11.6
      - continuum==1.2.7
      - diffdist==0.1
      - easydict==1.13
